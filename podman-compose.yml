services:
  claude-code:
    build:
      context: .
      dockerfile: Containerfile
    container_name: claude-code
    environment:
      - ANTHROPIC_BASE_URL=${OLLAMA_BASE_URL}
      - ANTHROPIC_AUTH_TOKEN=ollama
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - CLAUDE_CODE_DISABLE_TELEMETRY=1
    volumes:
      # Monta SOLO la cartella specificata in .env
      - ${WORKSPACE_PATH}:/workspace:Z
      # Persiste la configurazione di Claude Code tra le sessioni
      - ${CLAUDE_CONFIG_PATH:-~/.claude}:/root/.claude:Z
    working_dir: /workspace
    stdin_open: true
    tty: true
    # Accesso a internet abilitato tramite rete bridge (default podman-compose)
    # Il container condivide il DNS dell'host e ha accesso alla rete esterna
    dns:
      - 8.8.8.8
      - 8.8.4.4
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
      - /root/.npm
